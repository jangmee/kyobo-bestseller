name: 교보문고 베스트 수집

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: 수집 실행 (자동)
        if: github.event_name == 'schedule'
        run: python kyobo_collector.py --event schedule

      - name: 수집 실행 (수동)
        if: github.event_name == 'workflow_dispatch'
        run: python kyobo_collector.py --event workflow_dispatch

      - name: 결과 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kyobo_bestseller.csv aladin_bestseller.csv yes24_bestseller.csv history.json
          git diff --staged --quiet || git commit -m "자동 수집: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST"
          git push
